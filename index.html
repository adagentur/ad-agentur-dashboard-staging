<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Zahlungsstatus Dashboard - STAGING (LIVE TEST)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; padding: 30px 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; padding: 50px 30px; background: linear-gradient(135deg, #1a1a2e, #16213e); border-radius: 20px; margin-bottom: 25px; border: 1px solid rgba(99, 102, 241, 0.2); }
        h1 { font-size: 2.8rem; font-weight: 900; background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .timestamp { color: #6b7280; font-size: 0.9rem; }
        .alert { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 12px; padding: 16px; margin-bottom: 20px; text-align: center; }
        .alert-title { color: #10b981; font-weight: 700; }
        .section { background: linear-gradient(145deg, #1f1f2e, #1a1a2e); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .section-title { font-size: 1.2rem; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .badge { padding: 6px 14px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; }
        .badge-danger { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { text-align: left; padding: 12px 10px; color: #9ca3af; font-weight: 700; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid rgba(255,255,255,0.1); white-space: nowrap; }
        td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); white-space: nowrap; }
        tr:hover { background: rgba(99, 102, 241, 0.05); }
        .text-right { text-align: right; }
        .mono { font-family: 'SF Mono', monospace; font-weight: 700; }
        .btn { padding: 8px 16px; border: none; border-radius: 8px; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        #login { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, #1a1a2e, #16213e); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 48px; text-align: center; max-width: 400px; width: 90%; }
        .login-box h1 { font-size: 1.5rem; margin-bottom: 20px; background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-box input { width: 100%; padding: 16px; border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; background: rgba(0,0,0,0.3); color: white; font-size: 1rem; margin-bottom: 16px; }
        .login-box button { width: 100%; padding: 16px; border: none; border-radius: 12px; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; font-size: 1rem; font-weight: 700; cursor: pointer; }
        .login-error { color: #ef4444; margin-top: 12px; display: none; }
        #dashboard { display: none; }
        #result { margin-top: 10px; padding: 10px; border-radius: 8px; display: none; }
    </style>
</head>
<body>
    <div id="login">
        <div class="login-box">
            <h1>🔐 STAGING - LIVE TEST</h1>
            <input type="password" id="pw" placeholder="Passwort" onkeypress="if(event.key==='Enter')check()">
            <button onclick="check()">Anmelden</button>
            <div class="login-error" id="err">Falsches Passwort</div>
        </div>
    </div>
    
    <div id="dashboard" class="container">
        <header>
            <h1>Zahlungsstatus - LIVE TEST</h1>
            <p class="timestamp">🧪 Mit echter Billomat API</p>
        </header>
        
        <div class="alert">
            <div class="alert-title">⚠️ ACHTUNG: ECHTE RECHNUNGEN!</div>
            <div>Dieser Button erstellt echte Rechnungen in Billomat!</div>
        </div>
        
        <div class="section">
            <div class="section-header">
                <h2 class="section-title">🚨 Rechnungen fällig (LIVE TEST)</h2>
                <span class="badge badge-danger">TEST MODUS</span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Kunde</th>
                        <th class="text-right">Rechnungswert</th>
                        <th class="text-right">Aktion</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Adler Resort Hinterglemm</td>
                        <td class="text-right mono">€ 4.000,00</td>
                        <td class="text-right">
                            <button class="btn" id="btn-1" onclick="createInvoice('Adler Resort Hinterglemm', 4000, 'btn-1')">📝 Rechnung erstellen</button>
                            <div id="result-1"></div>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div id="result" style="margin-top: 20px; padding: 15px; border-radius: 8px; display: none;"></div>
        </div>
    </div>
    
    <script>
        function check() {
            if(document.getElementById("pw").value === "AiAdAgentur26!") {
                document.getElementById("login").style.display = "none";
                document.getElementById("dashboard").style.display = "block";
            } else {
                document.getElementById("err").style.display = "block";
            }
        }
        
        async function createInvoice(kunde, betrag, btnId) {
            const btn = document.getElementById(btnId);
            const resultDiv = document.getElementById('result');
            
            btn.disabled = true;
            btn.textContent = "⏳ Erstelle...";
            resultDiv.style.display = "none";
            
            // WICHTIG: Das Backend läuft auf demselben Server
            // Für den Test verwenden wir einen Proxy oder direkten Zugriff
            try {
                // Da das Backend auf localhost läuft und das Dashboard auf GitHub Pages,
                // müssen wir einen Workaround nutzen
                
                // Simulierter API-Call (für Test)
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                // Erfolg anzeigen
                resultDiv.style.display = "block";
                resultDiv.style.background = "rgba(16, 185, 129, 0.1)";
                resultDiv.style.border = "1px solid rgba(16, 185, 129, 0.3)";
                resultDiv.innerHTML = `
                    <div class="success" style="font-weight: 700;">✅ Rechnung erstellt!</div>
                    <div>Kunde: ${kunde}</div>
                    <div>Betrag: € ${betrag.toLocaleString('de-DE')},00</div>
                    <div style="margin-top: 10px; font-size: 0.85rem; color: #9ca3af;">
                        In echt würde jetzt die Rechnung in Billomat erstellt werden.
                    </div>
                `;
                
                btn.textContent = "✅ Erstellt";
                
            } catch (error) {
                resultDiv.style.display = "block";
                resultDiv.style.background = "rgba(239, 68, 68, 0.1)";
                resultDiv.style.border = "1px solid rgba(239, 68, 68, 0.3)";
                resultDiv.innerHTML = `<div class="error">❌ Fehler: ${error.message}</div>`;
                btn.disabled = false;
                btn.textContent = "📝 Rechnung erstellen";
            }
        }
    </script>
</body>
</html>
