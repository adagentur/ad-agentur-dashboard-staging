<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zahlungsstatus Dashboard - Live</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            line-height: 1.6;
        }
        
        /* Login Screen */
        #login-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .login-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 48px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        
        .login-box h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .login-box p { color: #9ca3af; margin-bottom: 24px; }
        
        .login-box input {
            width: 100%;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 1rem;
            margin-bottom: 16px;
        }
        
        .login-box button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }
        
        .error-message {
            color: #ef4444;
            margin-top: 12px;
            display: none;
        }
        
        /* Dashboard */
        #dashboard {
            display: none;
            padding: 30px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 50px 30px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }
        
        h1 {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .timestamp {
            color: #6b7280;
            font-size: 0.9rem;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #9ca3af;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(99, 102, 241, 0.3);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* KPI Grid */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .kpi-card {
            background: linear-gradient(145deg, #1f1f2e, #1a1a2e);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }
        
        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
        }
        
        .kpi-card.blue::before { background: linear-gradient(90deg, #6366f1, #8b5cf6); }
        .kpi-card.orange::before { background: linear-gradient(90deg, #f97316, #fb923c); }
        .kpi-card.green::before { background: linear-gradient(90deg, #10b981, #34d399); }
        
        .kpi-label {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #9ca3af;
            margin-bottom: 10px;
        }
        
        .kpi-value {
            font-size: 2.5rem;
            font-weight: 900;
            color: #fff;
            line-height: 1;
            margin-bottom: 4px;
            white-space: nowrap;
        }
        
        .kpi-subtext {
            font-size: 0.8rem;
            color: #6b7280;
        }
        
        .kpi-total {
            font-size: 1.1rem;
            font-weight: 800;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.08);
            white-space: nowrap;
        }
        
        .kpi-total.orange { color: #f97316; }
        .kpi-total.green { color: #10b981; }
        
        /* Sections */
        .section {
            background: linear-gradient(145deg, #1f1f2e, #1a1a2e);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }
        
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        
        .section-title {
            font-size: 1.2rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .badge {
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        
        .badge-danger {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        
        .badge-success {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        
        .badge-info {
            background: rgba(99, 102, 241, 0.2);
            color: #6366f1;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }
        
        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        
        th {
            text-align: left;
            padding: 12px 10px;
            color: #9ca3af;
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            white-space: nowrap;
        }
        
        td {
            padding: 12px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            white-space: nowrap;
        }
        
        tr:hover {
            background: rgba(99, 102, 241, 0.05);
        }
        
        .text-right { text-align: right; }
        .mono { font-family: 'SF Mono', monospace; font-weight: 700; }
        .positive { color: #10b981; font-weight: 800; }
        .negative { color: #ef4444; font-weight: 800; }
        
        /* Trophies */
        .trophy { font-size: 1.4rem; }
        
        /* Total Costs */
        .total-costs {
            text-align: right;
            padding: 16px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.05));
            border-radius: 12px;
            margin-top: 16px;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }
        
        .total-costs-label {
            color: #9ca3af;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .total-costs-value {
            font-size: 1.5rem;
            font-weight: 900;
            color: #6366f1;
            font-family: monospace;
            white-space: nowrap;
        }
        
        /* ABO Section */
        .abo-section {
            background: linear-gradient(145deg, rgba(99, 102, 241, 0.08), rgba(99, 102, 241, 0.03));
            border: 1px solid rgba(99, 102, 241, 0.2);
        }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <h1>🔐 Zahlungsstatus Dashboard</h1>
            <p>Bitte Passwort eingeben</p>
            <input type="password" id="password-input" placeholder="Passwort" onkeypress="if(event.key==='Enter')checkPassword()">
            <button onclick="checkPassword()">Anmelden</button>
            <div class="error-message" id="error-msg">Falsches Passwort</div>
        </div>
    </div>

    <div id="dashboard">
        <header>
            <h1>Zahlungsstatus</h1>
            <p class="timestamp" id="timestamp">Lade Daten...</p>
        </header>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Lade Live-Daten aus Google Sheets...</p>
        </div>
        
        <div id="content" style="display:none;">
            <!-- KPI Kacheln -->
            <div class="kpi-grid" id="kpi-section"></div>
            
            <!-- Rechnungen fällig -->
            <div class="section" id="rechnungen-section"></div>
            
            <!-- Overspend -->
            <div class="section" id="overspend-section"></div>
            
            <!-- Underspend -->
            <div class="section" id="underspend-section"></div>
            
            <!-- Alle aktiven Kunden -->
            <div class="section" id="alle-kunden-section"></div>
            
            <!-- ABO Kunden -->
            <div class="section abo-section" id="abo-section"></div>
            
            <!-- Top 5 -->
            <div class="section" id="top5-section"></div>
        </div>
    </div>

    <script>
        const DASHBOARD_PASSWORD = 'adagentur2026';
        const SHEET_ID = '1qTgbNCIaHtvGGXHlvXf0J2cnVh-F5yt4BTc2xgiOM_0';
        const GID = '1298332214';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;
        
        function checkPassword() {
            const input = document.getElementById('password-input').value;
            if (input === DASHBOARD_PASSWORD) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadData();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }
        
        function parseEuro(value) {
            if (!value) return 0;
            const clean = String(value).replace(/[€\s.]/g, '').replace(',', '.');
            return parseFloat(clean) || 0;
        }
        
        function formatEuro(value) {
            return '€ ' + value.toLocaleString('de-DE', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }
        
        async function loadData() {
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                const rows = csvText.split('\n').map(row => row.split(','));
                
                const data = [];
                const aboKunden = [];
                const rechnungenFaellig = [];
                
                // Skip header rows
                for (let i = 2; i < rows.length; i++) {
                    const row = rows[i];
                    if (row.length < 14) continue;
                    
                    const kunde = row[1] || '';
                    const status = row[13] || '';
                    const billingStatus = row[12] || '';
                    
                    // ABO Kunden
                    if (kunde.toUpperCase().includes('ABO')) {
                        aboKunden.push({
                            kunde: kunde,
                            budget: parseEuro(row[7]),
                            differenz: parseEuro(row[11])
                        });
                        continue;
                    }
                    
                    // Aktive Kunden
                    if (status.includes('Aktiv')) {
                        const rechnungswert = parseEuro(row[7]);
                        const daily28 = parseEuro(row[19]);
                        const ideal = parseEuro(row[20]);
                        const differenz = parseEuro(row[11]);
                        
                        if (billingStatus.includes('Rechnung')) {
                            rechnungenFaellig.push({kunde, rechnungswert});
                        }
                        
                        data.push({
                            kunde,
                            budget: rechnungswert,
                            rechnungswert,
                            daily28,
                            ideal,
                            differenz
                        });
                    }
                }
                
                // Berechne Metriken
                const overspend = data.filter(d => d.differenz < 0).sort((a, b) => a.differenz - b.differenz);
                const underspend = data.filter(d => d.differenz > 0).sort((a, b) => b.differenz - a.differenz);
                const top5 = [...data].sort((a, b) => b.daily28 - a.daily28).slice(0, 5);
                
                const gesamtKosten = data.reduce((sum, d) => sum + d.daily28, 0);
                const gesamtOverspend = overspend.reduce((sum, d) => sum + Math.abs(d.differenz), 0);
                const gesamtUnderspend = underspend.reduce((sum, d) => sum + d.differenz, 0);
                
                // Render
                renderKPIs(data.length, rechnungenFaellig.length, overspend.length, underspend.length, 
                          data.reduce((sum, d) => sum + d.rechnungswert, 0), gesamtOverspend, gesamtUnderspend);
                renderRechnungen(rechnungenFaellig);
                renderOverspend(overspend);
                renderUnderspend(underspend);
                renderAlleKunden(data);
                renderABO(aboKunden);
                renderTop5(top5, gesamtKosten);
                
                // Update timestamp
                const now = new Date();
                document.getElementById('timestamp').textContent = 
                    `🕐 Letztes Update: ${now.toLocaleDateString('de-DE')} ${now.toLocaleTimeString('de-DE', {hour: '2-digit', minute: '2-digit'})}`;
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                
            } catch (error) {
                console.error('Fehler:', error);
                document.getElementById('loading').innerHTML = 
                    `<p style="color: #ef4444;">❌ Fehler beim Laden: ${error.message}</p>`;
            }
        }
        
        function renderKPIs(anzahl, rechnungen, overspendCount, underspendCount, umsatz, gesamtOverspend, gesamtUnderspend) {
            document.getElementById('kpi-section').innerHTML = `
                <div class="kpi-card blue">
                    <div class="kpi-label">Aktive Kunden</div>
                    <div class="kpi-value">${anzahl}</div>
                    <div class="kpi-subtext">Gesamt</div>
                </div>
                <div class="kpi-card blue">
                    <div class="kpi-label">Monatlicher Umsatz</div>
                    <div class="kpi-value">${formatEuro(umsatz)}</div>
                    <div class="kpi-subtext">Aktive Kunden</div>
                </div>
                <div class="kpi-card orange">
                    <div class="kpi-label">⚠️ Overspend</div>
                    <div class="kpi-value">${overspendCount}</div>
                    <div class="kpi-subtext">Über Budget</div>
                    <div class="kpi-total orange">${formatEuro(gesamtOverspend)}</div>
                </div>
                <div class="kpi-card green">
                    <div class="kpi-label">✓ Underspend</div>
                    <div class="kpi-value">${underspendCount}</div>
                    <div class="kpi-subtext">Unter Budget</div>
                    <div class="kpi-total green">${formatEuro(gesamtUnderspend)}</div>
                </div>
            `;
        }
        
        function renderRechnungen(rechnungen) {
            let html = `
                <div class="section-header">
                    <h2 class="section-title">🚨 Rechnungen fällig</h2>
                    <span class="badge badge-danger">${rechnungen.length}</span>
                </div>
                <table>
                    <thead><tr><th>Kunde</th><th class="text-right">Rechnungswert</th></tr></thead>
                    <tbody>
            `;
            if (rechnungen.length === 0) {
                html += '<tr><td colspan="2" style="text-align:center;color:#6b7280;padding:20px;">✓ Keine Rechnungen fällig</td></tr>';
            } else {
                rechnungen.forEach(r => {
                    html += `<tr><td>${r.kunde}</td><td class="text-right mono">${formatEuro(r.rechnungswert)}</td></tr>`;
                });
            }
            html += '</tbody></table>';
            document.getElementById('rechnungen-section').innerHTML = html;
        }
        
        function renderOverspend(overspend) {
            let html = `
                <div class="section-header">
                    <h2 class="section-title">⚠️ Overspend (über Budget)</h2>
                    <span class="badge badge-danger">${overspend.length} Kunden</span>
                </div>
                <table>
                    <thead><tr><th>Kunde</th><th class="text-right">Soll</th><th class="text-right">Ist</th><th class="text-right">Abweichung</th></tr></thead>
                    <tbody>
            `;
            if (overspend.length === 0) {
                html += '<tr><td colspan="4" style="text-align:center;color:#6b7280;padding:20px;">✓ Keine Overspend</td></tr>';
            } else {
                overspend.forEach(o => {
                    html += `<tr><td>${o.kunde}</td><td class="text-right mono">${formatEuro(o.ideal)}</td><td class="text-right mono">${formatEuro(o.daily28)}</td><td class="text-right mono negative">${formatEuro(o.differenz)}</td></tr>`;
                });
            }
            html += '</tbody></table>';
            document.getElementById('overspend-section').innerHTML = html;
        }
        
        function renderUnderspend(underspend) {
            let html = `
                <div class="section-header">
                    <h2 class="section-title">✓ Underspend (unter Budget)</h2>
                    <span class="badge badge-success">${underspend.length} Kunden</span>
                </div>
                <table>
                    <thead><tr><th>Kunde</th><th class="text-right">Soll</th><th class="text-right">Ist</th><th class="text-right">Abweichung</th></tr></thead>
                    <tbody>
            `;
            if (underspend.length === 0) {
                html += '<tr><td colspan="4" style="text-align:center;color:#6b7280;padding:20px;">- Keine Underspend</td></tr>';
            } else {
                underspend.forEach(u => {
                    html += `<tr><td>${u.kunde}</td><td class="text-right mono">${formatEuro(u.ideal)}</td><td class="text-right mono">${formatEuro(u.daily28)}</td><td class="text-right mono positive">${formatEuro(u.differenz)}</td></tr>`;
                });
            }
            html += '</tbody></table>';
            document.getElementById('underspend-section').innerHTML = html;
        }
        
        function renderAlleKunden(data) {
            let html = `
                <div class="section-header">
                    <h2 class="section-title">📊 Alle aktiven Kunden</h2>
                    <span class="badge badge-info">${data.length}</span>
                </div>
                <table>
                    <thead><tr><th>Kunde</th><th class="text-right">Budget</th><th class="text-right">Differenz</th></tr></thead>
                    <tbody>
            `;
            data.sort((a, b) => a.kunde.localeCompare(b.kunde)).forEach(d => {
                const diffClass = d.differenz > 0 ? 'positive' : d.differenz < 0 ? 'negative' : '';
                html += `<tr><td>${d.kunde}</td><td class="text-right mono">${formatEuro(d.budget)}</td><td class="text-right mono ${diffClass}">${formatEuro(d.differenz)}</td></tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('alle-kunden-section').innerHTML = html;
        }
        
        function renderABO(aboKunden) {
            let html = `
                <div class="section-header">
                    <h2 class="section-title">🔄 ABO-Kunden</h2>
                    <span class="badge badge-info">${aboKunden.length}</span>
                </div>
                <table>
                    <thead><tr><th>Kunde</th><th class="text-right">Budget</th><th class="text-right">Differenz</th></tr></thead>
                    <tbody>
            `;
            aboKunden.forEach(abo => {
                const diffClass = abo.differenz > 0 ? 'positive' : abo.differenz < 0 ? 'negative' : '';
                html += `<tr><td>${abo.kunde}</td><td class="text-right mono">${formatEuro(abo.budget)}</td><td class="text-right mono ${diffClass}">${formatEuro(abo.differenz)}</td></tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('abo-section').innerHTML = html;
        }
        
        function renderTop5(top5, gesamtKosten) {
            const trophies = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣'];
            let html = `
                <div class="section-header">
                    <h2 class="section-title">🏆 Top 5 Kunden (nach Gesamtkosten)</h2>
                </div>
                <table>
                    <thead><tr><th>Rang</th><th>Kunde</th><th class="text-right">Gesamtkosten</th><th class="text-right">Monatliches Budget</th></tr></thead>
                    <tbody>
            `;
            top5.forEach((t, i) => {
                html += `<tr><td><span class="trophy">${trophies[i]}</span></td><td>${t.kunde}</td><td class="text-right mono">${formatEuro(t.daily28)}</td><td class="text-right mono">${formatEuro(t.budget)}</td></tr>`;
            });
            html += `</tbody></table>
                <div class="total-costs">
                    <div class="total-costs-label">Gesamtkosten aller Kunden</div>
                    <div class="total-costs-value">${formatEuro(gesamtKosten)}</div>
                </div>
            `;
            document.getElementById('top5-section').innerHTML = html;
        }
    </script>
</body>
</html>
